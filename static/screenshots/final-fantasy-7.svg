<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(165, 40%, 15%)" />
      <stop offset="100%" stop-color="hsl(165, 50%, 8%)" />
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="800" height="450" fill="url(#bg)" />

  <!-- decorative circles -->
  <circle cx="680" cy="380" r="180" fill="hsl(165, 45%, 18%)" opacity="0.35" />
  <circle cx="120" cy="70" r="100" fill="hsl(165, 45%, 20%)" opacity="0.25" />

  <!-- small controller / gamepad icon hint (subtle) -->
  <text x="400" y="180" text-anchor="middle" font-family="sans-serif"
        font-size="64" fill="hsl(165, 30%, 30%)" opacity="0.4">&#127918;</text>

  <!-- game title -->
  <text x="400" y="270" text-anchor="middle" dominant-baseline="middle"
        font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="48" font-weight="700"
        fill="hsl(165, 60%, 80%)"
        letter-spacing="1">Final Fantasy VII</text>

  <!-- subtle bottom label -->
  <text x="400" y="410" text-anchor="middle"
        font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="14" fill="hsl(165, 30%, 45%)"
        letter-spacing="2">PLACEHOLDER</text>
</svg>